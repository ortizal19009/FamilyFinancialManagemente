services:
  db:
    image: postgres:16-alpine
    container_name: ffm-db
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: FFM_DB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d FFM_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: ffm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:12345@192.168.1.79:5432/FFM_DB
      SECRET_KEY: dev-key-very-secret
      JWT_SECRET_KEY: jwt-dev-key
      UPLOAD_FOLDER: /app/backend/uploads
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/backend/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ffm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  backend_uploads:
