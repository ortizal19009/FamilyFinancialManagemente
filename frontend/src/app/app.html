<ng-container *ngIf="!isAuthPage; else authLayout">
  <div class="d-flex">
    <!-- Sidebar -->
    <nav class="sidebar shadow-lg">
      <div class="p-4 border-bottom border-white border-opacity-10 text-center">
        <h5 class="mb-0 fw-bold text-uppercase tracking-wider">Finanzas Familiar</h5>
      </div>
      
      <div class="mt-4 px-3 mb-2 small text-white text-opacity-50 text-uppercase fw-bold">General</div>
      <ul class="nav flex-column mb-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
            <i class="bi bi-speedometer2"></i> Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/banks" routerLinkActive="active">
            <i class="bi bi-bank"></i> Bancos
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/family" routerLinkActive="active">
            <i class="bi bi-people"></i> Miembros Familia
          </a>
        </li>
      </ul>

      <div class="mt-4 px-3 mb-2 small text-white text-opacity-50 text-uppercase fw-bold">Operaciones</div>
      <ul class="nav flex-column mb-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/expenses" routerLinkActive="active">
            <i class="bi bi-cart-plus"></i> Gastos Diarios
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/planning" routerLinkActive="active">
            <i class="bi bi-calendar-check"></i> Planificación
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/income" routerLinkActive="active">
            <i class="bi bi-cash-stack"></i> Ingresos
          </a>
        </li>
      </ul>

      <div class="mt-4 px-3 mb-2 small text-white text-opacity-50 text-uppercase fw-bold">Deudas y Bienes</div>
      <ul class="nav flex-column mb-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/cards" routerLinkActive="active">
            <i class="bi bi-credit-card"></i> Tarjetas
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/loans" routerLinkActive="active">
            <i class="bi bi-file-earmark-medical"></i> Préstamos
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/assets" routerLinkActive="active">
            <i class="bi bi-box-seam"></i> Inventario de Bienes
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/debtors" routerLinkActive="active">
            <i class="bi bi-people"></i> Deudores
          </a>
        </li>
      </ul>

      <div *ngIf="currentUser()?.role === 'admin'" class="mt-4 px-3 mb-2 small text-white text-opacity-50 text-uppercase fw-bold">Administración</div>
      <ul *ngIf="currentUser()?.role === 'admin'" class="nav flex-column mb-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/admin/users" routerLinkActive="active">
            <i class="bi bi-person-gear"></i> Gestionar Usuarios
          </a>
        </li>
      </ul>

      <!-- Logout button in sidebar footer -->
      <div class="mt-auto p-3 border-top border-white border-opacity-10">
        <button class="btn btn-sm btn-outline-light w-100 py-2 border-0 text-start" (click)="onLogout()">
          <i class="bi bi-box-arrow-left me-2"></i> Cerrar Sesión
        </button>
      </div>
    </nav>

    <!-- Main Content Area -->
    <div class="flex-grow-1 overflow-auto" style="height: 100vh;">
      <!-- Top Navbar -->
      <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-2 shadow-sm sticky-top" style="z-index: 1000;">
        <div class="container-fluid px-4">
          <button class="btn btn-sm btn-outline-secondary d-lg-none me-2">
            <i class="bi bi-list"></i>
          </button>
          <span class="navbar-text fw-medium">Panel de Control</span>
          
          <div class="ms-auto d-flex align-items-center gap-3">
            <div class="dropdown">
              <button class="btn btn-sm btn-light d-flex align-items-center gap-2 border" type="button">
                <i class="bi bi-person-circle"></i>
                <span class="d-none d-md-inline small fw-semibold">{{ currentUser()?.full_name || 'Usuario' }}</span>
              </button>
            </div>
          </div>
        </div>
      </nav>

      <!-- Page Content -->
      <main class="main-content min-vh-100 bg-light">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</ng-container>

<ng-template #authLayout>
  <router-outlet></router-outlet>
</ng-template>
